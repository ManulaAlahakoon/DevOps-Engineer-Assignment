# service.yaml

#   Inside Kubernetes, other services can reach us using:
#   http://ocr-model-service.ocr.svc.cluster.local:8080

apiVersion: v1
kind: Service
metadata:
  name: ocr-model-service    
  namespace: ocr
  labels:
    app: ocr-model
spec:
  type: {{ .Values.service.type }}  
  selector:
    app: ocr-model           # send traffic to pods with this label
  ports:
    - port: 8080             # the port the Service listens on
      targetPort: 8080       # the port on the Pod to forward traffic to
      protocol: TCP
